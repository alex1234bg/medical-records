<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <div class="row justify-content-center" style="margin-top: 5rem">
        <div class="col-md-5 text-center">
            <div style="font-size:5rem;font-weight:800;letter-spacing:-.04em;color:#fef7e0;line-height:1">500</div>
            <h4 class="mb-2 mt-2" style="color:#b06000">Internal Server Error</h4>
            <p class="text-muted mb-4"
               th:text="${message != null ? message : 'An unexpected error occurred. Please try again later.'}"></p>
            <a th:href="@{/}" class="btn btn-primary">Go Home</a>
        </div>
    </div>
</section>
</body>
</html>

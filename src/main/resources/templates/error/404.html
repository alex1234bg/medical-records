<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <div class="row justify-content-center" style="margin-top: 5rem">
        <div class="col-md-5 text-center">
            <div style="font-size:5rem;font-weight:800;letter-spacing:-.04em;color:#f1f3f4;line-height:1">404</div>
            <h4 class="mb-2 mt-2" style="color:#5f6368">Page Not Found</h4>
            <p class="text-muted mb-4"
               th:text="${message != null ? message : 'The resource you are looking for does not exist.'}"></p>
            <a th:href="@{/}" class="btn btn-primary">Go Home</a>
        </div>
    </div>
</section>
</body>
</html>

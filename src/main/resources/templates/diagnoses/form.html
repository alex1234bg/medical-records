<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0" th:text="${diagnosis.id != null} ? 'Edit Diagnosis' : 'Add Diagnosis'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${diagnosis.id != null} ? @{/diagnoses/{id}/update(id=${diagnosis.id})} : @{/diagnoses/save}"
                          th:object="${diagnosis}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Code</label>
                            <input type="text" class="form-control" th:field="*{code}"
                                   th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                                   maxlength="10" required/>
                            <div class="invalid-feedback" th:errors="*{code}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" th:field="*{description}" rows="3"
                                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:errors="*{description}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/diagnoses}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>

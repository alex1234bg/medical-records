<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <h2 class="mb-1">My Dashboard</h2>
    <p class="text-muted small mb-4" th:text="${doctor.name + ' – ' + doctor.specialty}"></p>

    <div class="row g-3 mb-5">

        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Total Examinations</div>
                    <div class="stat-num text-primary mt-1" th:text="${#lists.size(examinations)}">—</div>
                </div>
            </div>
        </div>

        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Total Revenue (EUR)</div>
                    <div class="stat-num mt-1" style="color:#137333" th:text="${#numbers.formatDecimal(totalRevenue, 1, 2)}">—</div>
                </div>
            </div>
        </div>

        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Sick Leaves Issued</div>
                    <div class="stat-num mt-1" style="color:#b06000" th:text="${#lists.size(sickLeaves)}">—</div>
                </div>
            </div>
        </div>

        <div class="col-sm-6 col-lg-3">
            <div class="card border-0 h-100">
                <div class="card-body">
                    <div class="text-muted" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Unique Patients</div>
                    <div class="stat-num mt-1" style="color:#0097a7" th:text="${uniquePatients}">—</div>
                </div>
            </div>
        </div>

    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">My Examinations</div>
        <div class="card-body">
            <form method="get" th:action="@{/doctor-dashboard}" class="row g-2 align-items-end mb-3">
                <div class="col-md-4">
                    <label class="form-label">From</label>
                    <input type="date" class="form-control" name="from" th:value="${from}"/>
                </div>
                <div class="col-md-4">
                    <label class="form-label">To</label>
                    <input type="date" class="form-control" name="to" th:value="${to}"/>
                </div>
                <div class="col-md-auto">
                    <button type="submit" class="btn btn-outline-primary">Filter</button>
                    <a th:href="@{/doctor-dashboard}" class="btn btn-outline-secondary ms-1">Clear</a>
                </div>
            </form>

            <table class="table table-sm table-hover mb-0">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Patient</th>
                        <th>Diagnosis</th>
                        <th>Treatment</th>
                        <th>Fee (EUR)</th>
                        <th>Patient Pays</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(examinations)}">
                        <td colspan="6" class="text-center text-muted py-3">No examinations found.</td>
                    </tr>
                    <tr th:each="e : ${examinations}">
                        <td th:text="${e.date}"></td>
                        <td th:text="${e.patient.name}"></td>
                        <td><span class="badge bg-info" th:text="${e.diagnosis.code}"></span></td>
                        <td th:text="${e.treatment}"></td>
                        <td th:text="${e.fee != null ? #numbers.formatDecimal(e.fee,1,2) : '—'}"></td>
                        <td>
                            <span th:if="${e.price != null and e.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                                  class="badge bg-success">NHIF</span>
                            <span th:unless="${e.price != null and e.price.compareTo(T(java.math.BigDecimal).ZERO) == 0}"
                                  th:text="${e.price != null ? #numbers.formatDecimal(e.price,1,2) + ' EUR' : '—'}"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header">Sick Leaves I Issued</div>
        <div class="card-body p-0">
            <table class="table table-sm table-hover mb-0">
                <thead>
                    <tr>
                        <th>Start Date</th>
                        <th>Days</th>
                        <th>End Date</th>
                        <th>Patient</th>
                        <th>Diagnosis</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(sickLeaves)}">
                        <td colspan="5" class="text-center text-muted py-3">No sick leaves issued.</td>
                    </tr>
                    <tr th:each="sl : ${sickLeaves}">
                        <td th:text="${sl.startDate}"></td>
                        <td th:text="${sl.days}"></td>
                        <td th:text="${sl.startDate.plusDays(sl.days - 1)}"></td>
                        <td th:text="${sl.examination.patient.name}"></td>
                        <td><span class="badge bg-info" th:text="${sl.examination.diagnosis.code}"></span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
</body>
</html>

<!DOCTYPE html>
<html th:fragment="layout(content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Medical Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        /* ── Design tokens ─────────────────────────────────── */
        :root {
            --accent:       #1a73e8;
            --accent-hover: #1557b0;
            --accent-soft:  #e8f0fe;
            --ok-bg:        #e6f4ea;
            --ok-text:      #137333;
            --err-bg:       #fce8e6;
            --err-text:     #c5221f;
            --info-bg:      #e8f0fe;
            --info-text:    #1a73e8;
            --warn-bg:      #fef7e0;
            --warn-text:    #b06000;
            --card-r:       12px;
            --btn-r:        8px;
            --input-r:      8px;
            --font:         -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --ink:          #202124;
            --ink-dim:      #5f6368;
            --border:       #dadce0;
            --surface:      #f8f9fa;
        }

        /* ── Base ───────────────────────────────────────────── */
        body { font-family: var(--font); background: var(--surface); color: var(--ink); }

        /* ── Navbar ─────────────────────────────────────────── */
        .navbar {
            background: #fff !important;
            border-bottom: 1px solid var(--border);
            padding: 0.55rem 0;
        }
        .navbar-brand {
            color: var(--accent) !important;
            font-weight: 700;
            font-size: 0.975rem;
            letter-spacing: -0.01em;
        }
        .nav-link {
            color: var(--ink-dim) !important;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.4rem 0.7rem !important;
            border-radius: 6px;
            transition: background 0.12s, color 0.12s;
        }
        .nav-link:hover { color: var(--ink) !important; background: var(--surface); }
        .navbar-toggler { border-color: var(--border); }
        .navbar-toggler-icon { filter: invert(50%); }

        /* ── Cards ──────────────────────────────────────────── */
        .card {
            border: 1px solid var(--border) !important;
            border-radius: var(--card-r) !important;
            box-shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04) !important;
        }
        .card-header {
            background: #fff !important;
            border-bottom: 1px solid var(--border) !important;
            padding: 0.9rem 1.25rem;
            border-radius: calc(var(--card-r) - 1px) calc(var(--card-r) - 1px) 0 0 !important;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--ink);
        }
        .card-body { padding: 1.25rem; }

        /* ── Tables ─────────────────────────────────────────── */
        .table { font-size: 0.875rem; color: var(--ink); }
        .table thead th {
            background: var(--surface);
            color: var(--ink-dim);
            font-weight: 600;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border-bottom: 1px solid var(--border);
            border-top: none;
            padding: 0.7rem 1rem;
        }
        .table tbody td {
            padding: 0.85rem 1rem;
            vertical-align: middle;
            border-color: #f1f3f4;
        }
        .table tbody tr:last-child td { border-bottom: none; }
        .table-hover tbody tr:hover > * { background: #f5f7fa !important; }
        /* neutralise Bootstrap striping — our hover does the job */
        .table-striped > tbody > tr:nth-of-type(odd) > * { background: transparent !important; }
        /* remove heavy all-around borders from table-bordered */
        .table-bordered > :not(caption) > * > * { border-width: 0 0 1px; }
        .table-bordered > thead > tr > * { border-bottom-width: 1px; }

        /* smaller stat tables */
        .table-sm thead th { padding: 0.55rem 0.875rem; }
        .table-sm tbody td { padding: 0.6rem 0.875rem; }

        /* ── Buttons ────────────────────────────────────────── */
        .btn { border-radius: var(--btn-r); font-size: 0.875rem; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover, .btn-primary:focus {
            background: var(--accent-hover); border-color: var(--accent-hover);
            box-shadow: 0 2px 6px rgba(26,115,232,.35);
        }
        .btn-outline-secondary {
            background: #f1f3f4; color: var(--ink-dim); border-color: transparent;
        }
        .btn-outline-secondary:hover { background: #e8eaed; color: var(--ink); border-color: transparent; }
        .btn-outline-danger {
            background: var(--err-bg); color: var(--err-text); border-color: transparent;
        }
        .btn-outline-danger:hover { background: #f28b82; color: #fff; border-color: transparent; }
        .btn-outline-primary {
            background: var(--accent-soft); color: var(--accent); border-color: transparent;
        }
        .btn-outline-primary:hover { background: var(--accent); color: #fff; border-color: transparent; }
        .btn-sm { padding: 0.32rem 0.7rem; font-size: 0.8rem; }
        .btn-lg { padding: 0.65rem 1.5rem; font-size: 0.95rem; }

        /* ── Forms ──────────────────────────────────────────── */
        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: var(--input-r);
            font-size: 0.875rem;
            padding: 0.6rem 0.875rem;
            color: var(--ink);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26,115,232,.15);
        }
        .form-control[disabled], .form-control[readonly] {
            background: var(--surface); color: var(--ink-dim); cursor: default;
        }
        .form-label {
            font-size: 0.73rem;
            font-weight: 600;
            color: var(--ink-dim);
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-text { font-size: 0.78rem; color: var(--ink-dim); }
        .form-check-input:checked { background-color: var(--accent); border-color: var(--accent); }
        .form-check-input:focus { box-shadow: 0 0 0 3px rgba(26,115,232,.15); border-color: var(--accent); }
        .invalid-feedback { font-size: 0.78rem; }

        /* ── Badges ─────────────────────────────────────────── */
        .badge {
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.72rem;
            padding: 0.3em 0.75em;
        }
        .badge.bg-success  { background: var(--ok-bg)     !important; color: var(--ok-text)   !important; }
        .badge.bg-danger   { background: var(--err-bg)    !important; color: var(--err-text)  !important; }
        .badge.bg-secondary{ background: #f1f3f4          !important; color: var(--ink-dim)   !important; }
        .badge.bg-info     { background: var(--info-bg)   !important; color: var(--info-text) !important; }
        .badge.bg-warning  { background: var(--warn-bg)   !important; color: var(--warn-text) !important; }
        .badge.bg-primary  { background: var(--accent-soft)!important; color: var(--accent)   !important; }
        /* override Bootstrap's text-dark utility inside badges */
        .badge.text-dark   { color: var(--info-text) !important; }

        /* ── Alerts ─────────────────────────────────────────── */
        .alert { border-radius: 10px; border: none; font-size: 0.875rem; }
        .alert-success { background: var(--ok-bg);   color: var(--ok-text);   }
        .alert-danger  { background: var(--err-bg);  color: var(--err-text);  }
        .alert-warning { background: var(--warn-bg); color: var(--warn-text); }
        .alert-info    { background: var(--info-bg); color: var(--info-text); }
        .btn-close { filter: none; }

        /* ── Typography ─────────────────────────────────────── */
        h2 { font-weight: 700; font-size: 1.35rem; letter-spacing: -0.02em; color: var(--ink); }
        h4, h5 { font-weight: 600; color: var(--ink); }
        .text-primary { color: var(--accent)  !important; }
        .text-muted   { color: var(--ink-dim) !important; }

        /* ── Stat summary cards ─────────────────────────────── */
        .stat-num { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 0.25rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">&#9877; Medical Records</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/doctors}">Doctors</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('DOCTOR','ADMIN')">
                    <a class="nav-link" th:href="@{/patients}">Patients</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('DOCTOR','ADMIN')">
                    <a class="nav-link" th:href="@{/examinations}">Examinations</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('DOCTOR','ADMIN')">
                    <a class="nav-link" th:href="@{/diagnoses}">Diagnoses</a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('DOCTOR','ADMIN')">
                    <a class="nav-link" th:href="@{/sick-leaves}">Sick Leaves</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('PATIENT')">
                    <a class="nav-link" th:href="@{/my-history}">My Medical History</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('PATIENT')">
                    <a class="nav-link" th:href="@{/my-profile}">My Profile</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('DOCTOR')">
                    <a class="nav-link" th:href="@{/doctor-dashboard}">My Dashboard</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/statistics}">Statistics</a>
                </li>

            </ul>
            <ul class="navbar-nav align-items-center gap-2">
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="small" style="color:var(--ink-dim)">
                        Signed in as&nbsp;<strong style="color:var(--ink)" sec:authentication="name">user</strong>
                    </span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-secondary btn-sm">Sign out</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    <div th:replace="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

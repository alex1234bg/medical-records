<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0" th:text="${sickLeave.id != null} ? 'Edit Sick Leave' : 'Add Sick Leave'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${sickLeave.id != null} ? @{/sick-leaves/{id}/update(id=${sickLeave.id})} : @{/sick-leaves/save}"
                          th:object="${sickLeave}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Start Date</label>
                            <input type="date" class="form-control" th:field="*{startDate}"
                                   th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'" required/>
                            <div class="invalid-feedback" th:errors="*{startDate}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Duration (days)</label>
                            <input type="number" class="form-control" th:field="*{days}"
                                   th:classappend="${#fields.hasErrors('days')} ? 'is-invalid'"
                                   min="1" max="365" required/>
                            <div class="invalid-feedback" th:errors="*{days}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Examination</label>
                            <select class="form-select" name="examinationId"
                                    th:classappend="${#fields.hasErrors('examinationId')} ? 'is-invalid'" required>
                                <option value="">— Select Examination —</option>
                                <option th:each="exam : ${examinations}"
                                        th:value="${exam.id}"
                                        th:text="${exam.date + ' | ' + exam.patientName + ' | ' + exam.diagnosisCode}"
                                        th:selected="${sickLeave.examinationId != null and sickLeave.examinationId.equals(exam.id)}">
                                </option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{examinationId}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/sick-leaves}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>

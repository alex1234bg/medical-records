<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0" th:text="${doctor.id != null} ? 'Edit Doctor' : 'Add Doctor'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${doctor.id != null} ? @{/doctors/{id}/update(id=${doctor.id})} : @{/doctors/save}"
                          th:object="${doctor}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Unique ID</label>
                            <input type="text" class="form-control" th:field="*{uniqueId}"
                                   th:classappend="${#fields.hasErrors('uniqueId')} ? 'is-invalid'" required/>
                            <div class="invalid-feedback" th:errors="*{uniqueId}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Specialty</label>
                            <input type="text" class="form-control" th:field="*{specialty}"
                                   th:classappend="${#fields.hasErrors('specialty')} ? 'is-invalid'"/>
                            <div class="invalid-feedback" th:errors="*{specialty}"></div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{GP}"/>
                            <label class="form-check-label" th:for="${#ids.prev('GP')}">General Practitioner (GP)</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/doctors}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>

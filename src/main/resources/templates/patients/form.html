<!DOCTYPE html>
<html th:replace="~{layout/base :: layout(~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h5 class="mb-0" th:text="${patient.id != null} ? 'Edit Patient' : 'Add Patient'"></h5>
                </div>
                <div class="card-body">
                    <form th:action="${patient.id != null} ? @{/patients/{id}/update(id=${patient.id})} : @{/patients/save}"
                          th:object="${patient}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" required/>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">EGN</label>
                            <input type="text" class="form-control" th:field="*{egn}"
                                   th:classappend="${#fields.hasErrors('egn')} ? 'is-invalid'"
                                   maxlength="10" required/>
                            <div class="invalid-feedback" th:errors="*{egn}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Personal Doctor</label>
                            <select class="form-select" name="personalDoctorId">
                                <option value="">— None —</option>
                                <option th:each="doctor : ${doctors}"
                                        th:value="${doctor.id}"
                                        th:text="${doctor.name + ' (' + doctor.specialty + ')'}"
                                        th:selected="${patient.personalDoctorId != null and patient.personalDoctorId.equals(doctor.id)}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{insured}"/>
                            <label class="form-check-label" th:for="${#ids.prev('insured')}">Insured (covered by NHIF)</label>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a th:href="@{/patients}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
